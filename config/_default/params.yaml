# ══════════════════════════════════════════════════════════════════════════════
# KONFIGURASI PORTFOLIO
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITAS
  # Branding tingkat situs
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    # Nama situs - ditampilkan di navbar, footer, hak cipta, dan judul browser secara default
    name: "Angga Prastya Sianipar"
    # Badan hukum untuk pemberitahuan hak cipta (kosong agar tidak double di footer)
    organization: ""
    # Tipe Schema.org untuk data terstruktur
    type: person # person | organization | local_business
    # Slogan pendek yang ditampilkan di situs Anda
    tagline: "Web Developer | Back-End Engineer | Informatics Engineering Graduate"
    # Deskripsi meta situs untuk mesin pencari dan pembagian ke media sosial
    description: "Angga Prastya Sianipar's professional portfolio site. Focusing on web application development, back-end engineering, database management, and software architecture."
    # Akun sosial (digunakan untuk tag meta seperti Twitter Cards)
    social:
      twitter: "" # Handle Twitter/X Anda jika ada (tanpa @)

  # ────────────────────────────────────────────────────────────────────────────
  # TEMA
  # Sistem desain visual dan warna
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    # Mode: 'light', 'dark', atau 'system' (mengikuti preferensi OS)
    mode: system
    # Paket tema: nama dari data/themes/ atau { light: "x", dark: "y" } untuk padu-padan
    pack: "default"
    # Opsional: Mengesampingkan warna paket tema
    colors:
      primary: "indigo" # Nama palet Tailwind atau hex (misal, "indigo" atau "#6366f1")
      secondary: ""
      neutral: "" # Mempengaruhi utilitas abu-abu (text-gray-*, bg-gray-*)
    # Opsional: Pengesampingkan warna spesifik-mode
    colors_light: {}
    colors_dark: {}
    # Opsional: Pengesampingkan warna permukaan semantik
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TIPOGRAFI
  # Font dan ukuran teks
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    # Paket tema: nama dari data/fonts/
    pack: "academic"

  # ────────────────────────────────────────────────────────────────────────────
  # TATA LETAK
  # Token jarak dan bentuk
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    # Radius batas (border radius): 'none', 'sm', 'md', 'lg', atau 'full'
    radius: "md"
    # Kepadatan jarak (spacing): 'compact', 'comfortable', atau 'spacious'
    spacing: "spacious"
    # Bentuk avatar pada profil penulis (author)
    avatar_shape: circle # circle | square | rounded

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Header situs dan bilah navigasi
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    # Varian gaya header
    style: navbar # navbar | navbar-simple | minimal
    # Tetap di atas saat digulir (sticky)
    sticky: true
    # Penyelarasan menu
    align: center # left | center | right
    # Pengaktifan fitur
    search: true
    theme_toggle: true
    theme_picker: true
    language_switcher: false
    # Tombol ajakan bertindak (Call-to-action)
    cta:
      enable: false
      text: ""
      url: ""

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # Footer situs
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    # Varian gaya footer
    style: minimal # minimal | columns | centered
    language_switcher: false
    # BERHASIL DIUBAH: Ditambahkan selektor CSS kustom untuk menghilangkan tombol promosi "Build your site" (termasuk ikon petirnya)
    text: '<style>.cc-attribution, .powered-by-link, a[href*="github.com/hugoblox/hugo-blox-builder"] { display: none !important; } .powered-by a, .v2-footer a, a[href*="hugoblox.com"], a[href*="wowchemy.com"] { pointer-events: none !important; cursor: default !important; color: inherit !important; text-decoration: none !important; }</style>'

  # ────────────────────────────────────────────────────────────────────────────
  # HAK CIPTA
  # Pemberitahuan hukum dan lisensi
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    # Pemberitahuan hak cipta - mendukung placeholder {year}, {name}, {license}
    notice: "© {year} {name}. Seluruh hak cipta dilindungi undang-undang."
    license:
      type: custom # cc | custom
      allow_derivatives: false
      share_alike: false
      allow_commercial: false

  # ────────────────────────────────────────────────────────────────────────────
  # SEO
  # Optimalisasi mesin pencari - pengesampingkan dan pengaturan teknis
  # ────────────────────────────────────────────────────────────────────────────
  seo:
    # Pengesampingkan judul tab browser (default menggunakan identity.name jika tidak diatur)
    title: "Angga Prastya Sianipar | Web Developer & Back-End Engineer Portfolio"
    # Hanya untuk tipe identitas local_business
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    # Panduan crawler AI/LLM (llms.txt)
    ai:
      allow:
        - /
      disallow: []
      note: "Panduan untuk AI crawler - disesuaikan agar indeksasi fokus pada proyek portofolio pengembangan perangkat lunak saya."
      contact: ""

  # ────────────────────────────────────────────────────────────────────────────
  # KONTEN
  # Perenderan dan perilaku konten
  # ────────────────────────────────────────────────────────────────────────────
  content:
    # Perenderan Matematika
    math:
      enable: true
    # Daftar isi (Table of contents)
    toc:
      enable: true
    # Perkiraan waktu membaca
    reading_time:
      enable: true
    # Sitasi akademik
    citations:
      style: apa # apa | mla | chicago | ieee

  # ────────────────────────────────────────────────────────────────────────────
  # PENCARIAN
  # Pencarian situs
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    # Istilah pencarian yang tren/disarankan
    suggestions: ["Back-End", "Web Development", "Python", "MySQL", "API", "Software Engineering"]
    # Pintasan tindakan cepat di modal pencarian
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # KOMENTAR
  # Sistem komentar pengguna
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: "" # giscus | disqus
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALITIK
  # Analitik lalu lintas dan perilaku pengunjung
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: "" # Google Analytics 4: G-XXXXXXXXXX
    google_tag_manager:
      container_id: "" # GTM-XXXXXXX
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFIKASI
  # Kode verifikasi situs untuk mesin pencari
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORI
  # Repositori kode sumber untuk tautan "Edit halaman ini"
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: true
    url: "https://github.com/AnggaPrastyaSianipar/portofolio-angga" # Repositori GitHub portofolio pribadi Anda
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOKALISASI (LOCALE)
  # Preferensi format regional
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006" # Dikembalikan ke format standar Go Hugo bawaan
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVASI
  # Fitur privasi dan kepatuhan
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: true
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # FITUR BERBAGI (SHARING BUTTONS)
  # 5 Ikon utama yang dikunci untuk komunikasi langsung (Pesan/Chat/Email)
  # ────────────────────────────────────────────────────────────────────────────
  sharing:
    twitter: true     # Dipertahankan untuk share link via platform obrolan X
    facebook: false   # Dimatikan karena API Facebook memaksa share ke feed publik
    email: true       # Otomatis membuka email personal baru (Kirim pesan pribadi)
    linkedin: false   # Dimatikan karena API LinkedIn memaksa share ke feed publik
    whatsapp: true    # Otomatis membuka aplikasi WhatsApp (Kirim chat personal/grup)

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Pengembangan dan debugging (tersembunyi di produksi)
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left # top-left | top-right | bottom-left | bottom-right
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # Fitur premium dan program kreator (afiliasi)
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    # Mengaktifkan opsi internal untuk menyembunyikan tautan luar
    hide_attribution: true

    # Kode rujukan afiliasi untuk program hadiah
    affiliate_code: ""